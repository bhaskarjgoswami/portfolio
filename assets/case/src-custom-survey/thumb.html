<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Thumbnail — Custom survey redesign</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1120px; height:1120px; overflow:hidden; font-family:'Inter',sans-serif;
    background:radial-gradient(circle at 15% 0%, rgba(255,255,255,.25), transparent 50%),
               radial-gradient(circle at 100% 100%, rgba(255,142,96,.4), transparent 55%),
               radial-gradient(circle at 0% 100%, rgba(146,100,255,.35), transparent 55%),
               linear-gradient(160deg, #6549d6 0%, #8265e3 45%, #a385f0 100%);
    display:flex; align-items:center; justify-content:center; position:relative; }

  .stepper { position:absolute; top:120px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:16px; }
  .st { display:flex; align-items:center; gap:10px; }
  .dot { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; background:rgba(255,255,255,.25); color:#fff; border:2px solid rgba(255,255,255,.45); }
  .dot.on { background:#fff; color:#6549d6; border-color:#fff; }
  .conn { width:52px; height:2px; background:rgba(255,255,255,.4); border-radius:1px; }

  .card { width:640px; background:#fff; border-radius:24px; padding:52px 56px; box-shadow:0 48px 110px -30px rgba(20,10,60,.55); position:relative; z-index:2; }
  .prog { display:flex; align-items:center; justify-content:space-between; margin-bottom:30px; }
  .prog .k { font-size:17px; color:#98a2b3; font-weight:500; }
  .bar { width:180px; height:8px; background:#eef0f4; border-radius:4px; overflow:hidden; }
  .bar i { display:block; width:58%; height:100%; background:#7f56d9; border-radius:4px; }
  .q { font-size:29px; font-weight:600; color:#1f2937; line-height:1.4; text-align:center; margin-bottom:38px; }
  .likert { display:flex; justify-content:space-between; gap:14px; margin-bottom:14px; }
  .sm { width:82px; height:82px; border-radius:50%; border:2px solid #e5e7eb; display:flex; align-items:center; justify-content:center; font-size:38px; background:#fff; }
  .sm.sel { border-color:#7f56d9; background:#faf8ff; box-shadow:0 0 0 6px rgba(127,86,217,.16); }
  .lbls { display:flex; justify-content:space-between; font-size:14.5px; color:#9ca3af; }

  .chip-bank { position:absolute; left:74px; bottom:180px; width:300px; background:rgba(255,255,255,.95); border-radius:18px; padding:22px; box-shadow:0 30px 60px -24px rgba(20,10,60,.5); transform:rotate(-5deg); z-index:1; }
  .cb-t { font-size:14px; font-weight:600; color:#1f2937; margin-bottom:14px; }
  .cb-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 12px; border:1px solid #edf0f7; border-radius:11px; background:#fafbfc; margin-bottom:9px; }
  .cb-line { height:8px; border-radius:4px; background:rgba(41,41,76,.16); flex:1; }
  .cb-add { width:28px; height:28px; border-radius:8px; background:#7f56d9; color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; flex:none; }

  .chip-tag { position:absolute; right:88px; top:270px; background:#ecfdf3; color:#039855; font-size:16px; font-weight:600; padding:11px 20px; border-radius:22px; box-shadow:0 18px 40px -18px rgba(0,0,0,.35); transform:rotate(4deg); z-index:3; }
  .chip-live { position:absolute; right:110px; bottom:212px; display:flex; align-items:center; gap:10px; background:#fff; padding:13px 22px; border-radius:26px; font-size:16.5px; font-weight:600; color:#1f2937; box-shadow:0 22px 46px -18px rgba(20,10,60,.5); transform:rotate(3deg); z-index:3; }
  .live-dot { width:11px; height:11px; border-radius:50%; background:#12b76a; box-shadow:0 0 0 5px rgba(18,183,106,.2); }

  .spark { position:absolute; color:rgba(255,255,255,.85); }
</style>
</head>
<body>
  <div class="stepper">
    <div class="st"><div class="dot on">✓</div></div><div class="conn"></div>
    <div class="st"><div class="dot on">✓</div></div><div class="conn"></div>
    <div class="st"><div class="dot" style="background:#fff;color:#6549d6;border-color:#fff;">3</div></div><div class="conn"></div>
    <div class="st"><div class="dot">4</div></div><div class="conn"></div>
    <div class="st"><div class="dot">5</div></div>
  </div>

  <div class="card">
    <div class="prog"><span class="k">Question 7 of 12</span><div class="bar"><i></i></div></div>
    <div class="q">I feel motivated to go beyond what is expected of me at work.</div>
    <div class="likert">
      <div class="sm">😞</div>
      <div class="sm">🙁</div>
      <div class="sm">😐</div>
      <div class="sm sel">🙂</div>
      <div class="sm">😄</div>
    </div>
    <div class="lbls"><span>Strongly disagree</span><span>Strongly agree</span></div>
  </div>

  <div class="chip-bank">
    <div class="cb-t">Question bank</div>
    <div class="cb-row"><span class="cb-line"></span><span class="cb-add">+</span></div>
    <div class="cb-row"><span class="cb-line" style="width:70%"></span><span class="cb-add">+</span></div>
    <div class="cb-row" style="margin-bottom:0"><span class="cb-line"></span><span class="cb-add">+</span></div>
  </div>

  <div class="chip-tag">Rated 1–5</div>
  <div class="chip-live"><span class="live-dot"></span> Live preview</div>

  <svg class="spark" style="top:210px; left:150px" width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.2 5.6L20 10l-5.8 2.4L12 18l-2.2-5.6L4 10l5.8-2.4z" fill="currentColor"/></svg>
  <svg class="spark" style="bottom:130px; right:210px" width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.2 5.6L20 10l-5.8 2.4L12 18l-2.2-5.6L4 10l5.8-2.4z" fill="currentColor"/></svg>
</body>
</html>
